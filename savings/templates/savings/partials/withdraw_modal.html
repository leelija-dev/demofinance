<div id="withdrawModalConfig" data-api-url="{% url 'branch:api_savings_collect' %}" class="hidden"></div>

<div id="withdrawModal" class="fixed inset-0 z-[9999] hidden overflow-y-auto">
    <div class="fixed inset-0 bg-black/50"></div>
    <div class="relative z-10 flex min-h-screen items-start justify-center p-4 sm:items-center sm:p-6">
        <div class="flex w-full max-w-sm sm:max-w-lg md:max-w-xl flex-col rounded-2xl bg-white shadow-lg dark:bg-gray-900 max-h-[calc(100vh-2rem)] sm:max-h-[calc(100vh-4rem)] overflow-hidden">
            <div class="sticky top-0 z-10 flex items-center justify-between border-b border-gray-100 bg-white p-4 dark:border-gray-800 dark:bg-gray-900 sm:p-6">
                <h3 class="text-base font-semibold text-gray-900 dark:text-white sm:text-lg">Withdraw / Close</h3>
                <button type="button" id="withdrawModalClose" class="inline-flex h-9 w-9 items-center justify-center rounded-md text-gray-500 hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-gray-200">X</button>
            </div>

            <form id="withdrawForm" class="flex flex-1 flex-col overflow-hidden">
                <div class="flex-1 space-y-3 overflow-y-auto p-4 sm:p-6">
                    <input type="hidden" id="withdrawAccountId" />
                    <input type="hidden" id="withdrawApplicationId" />
                    <input type="hidden" id="withdrawAmount" />

                    <div>
                        <p class="text-sm text-gray-500 dark:text-gray-400">Customer</p>
                        <p id="withdrawCustomer" class="text-base font-medium text-gray-800 dark:text-white/90">-</p>
                    </div>

                    <div class="grid grid-cols-1 gap-3 sm:grid-cols-3">
                        <div class="rounded-lg border border-gray-200 p-3 dark:border-gray-700">
                            <p class="text-xs text-gray-500 dark:text-gray-400">Principal</p>
                            <p id="withdrawPrincipal" class="text-sm font-semibold text-gray-800 dark:text-white/90">₹0.00</p>
                        </div>
                        <div id="withdrawInterestBox" class="rounded-lg border border-gray-200 p-3 dark:border-gray-700">
                            <p class="text-xs text-gray-500 dark:text-gray-400">Interest</p>
                            <p id="withdrawInterest" class="text-sm font-semibold text-gray-800 dark:text-white/90">₹0.00</p>
                        </div>
                        <div class="rounded-lg border border-gray-200 p-3 dark:border-gray-700">
                            <p class="text-xs text-gray-500 dark:text-gray-400">Payable</p>
                            <p id="withdrawPayable" class="text-sm font-semibold text-gray-800 dark:text-white/90">₹0.00</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                        <div>
                            <label class="block text-sm text-gray-600 dark:text-gray-300">Date</label>
                            <input type="date" id="withdrawDate" class="mt-1 w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-gray-900 dark:border-gray-700 dark:bg-gray-800 dark:text-white" />
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 dark:text-gray-300">Payment Mode</label>
                            <select id="withdrawPaymentMode" class="mt-1 w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-gray-900 dark:border-gray-700 dark:bg-gray-800 dark:text-white">
                                {% for mode_value, mode_label in payment_modes %}
                                <option value="{{ mode_value }}">{{ mode_label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                        <div>
                            <label class="block text-sm text-gray-600 dark:text-gray-300">Receipt No</label>
                            <input type="text" id="withdrawReceiptNo" class="mt-1 w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-gray-900 dark:border-gray-700 dark:bg-gray-800 dark:text-white" />
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 dark:text-gray-300">Note</label>
                            <input type="text" id="withdrawNote" class="mt-1 w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-gray-900 dark:border-gray-700 dark:bg-gray-800 dark:text-white" />
                        </div>
                    </div>
                </div>

                <div class="shrink-0 border-t border-gray-100 bg-white p-4 dark:border-gray-800 dark:bg-gray-900 sm:p-6">
                    <div class="flex items-center justify-end gap-3">
                        <button type="button" id="withdrawCancel" class="inline-flex items-center justify-center rounded-md bg-gray-500 px-5 py-2 text-sm font-medium text-white hover:bg-gray-700 transition">Cancel</button>
                        <button type="submit" id="withdrawSubmit" class="inline-flex items-center justify-center rounded-md bg-red-600 px-5 py-2 text-sm font-medium text-white hover:bg-red-700 transition">Submit</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
