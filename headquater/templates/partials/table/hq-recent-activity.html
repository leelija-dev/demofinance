<!-- Recent Activity -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
  <!-- Left: Recent Loan Activity -->
  <div class="bg-white dark:bg-gray-800 rounded-lg overflow-hidden border border-stroke dark:border-gray-700 dark:bg-boxdark">
    <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Recent Loan Activity</h3>
      <a href="/hq/loan-applications/" class="text-sm text-blue-600 dark:text-blue-400 hover:underline">View All</a>
    </div>
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Loan ID</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Customer</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Amount</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Date</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Status</th>
            <!-- <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Action</th> -->
          </tr>
        </thead>
        <tbody class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
          <template x-if="!recentLoans || recentLoans.length === 0">
            <tr>
              <td colspan="6" class="px-6 py-6 text-center text-sm text-gray-500 dark:text-gray-400">No recent loan activity</td>
            </tr>
          </template>
          <template x-for="item in recentLoans" :key="item.loan_ref_no">
            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700">
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white" x-text="item.loan_ref_no"></td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400" x-text="item.customer || '—'"></td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400" x-text="(item.amount ?? 0).toLocaleString('en-IN', { style: 'currency', currency: 'INR' })"></td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400" x-text="item.date"></td>
              <td class="px-6 py-4 whitespace-nowrap">
                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                  :class="{
                    'bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200': (item.status || '').includes('pending') || item.status === 'branch_approved',
                    'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200': (item.status || '').includes('approved') || (item.status || '').includes('disbursed'),
                    'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200': (item.status || '').includes('reject')
                  }"
                  x-text="item.status"></span>
              </td>
              <!-- <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <a :href="'/hq/loan-applications/' + item.loan_ref_no + '/'" class="text-blue-600 dark:text-blue-400 hover:text-blue-900 dark:hover:text-blue-500">View</a>
              </td> -->
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Right: Recent Branch Activity -->
  <div class="bg-white dark:bg-gray-800 rounded-lg overflow-hidden border border-stroke dark:border-gray-700 dark:bg-boxdark">
    <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Recent Branch Activity</h3>
      <a href="/hq/branch/" class="text-sm text-blue-600 dark:text-blue-400 hover:underline">View All</a>
    </div>
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Branch ID</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Branch</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">City</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Date</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Status</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Action</th>
          </tr>
        </thead>
        <tbody class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
          <template x-if="!recentBranches || recentBranches.length === 0">
            <tr>
              <td colspan="6" class="px-6 py-6 text-center text-sm text-gray-500 dark:text-gray-400">No recent branch activity</td>
            </tr>
          </template>
          <template x-for="b in recentBranches" :key="b.branch_id">
            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700">
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white" x-text="'#' + b.branch_id"></td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400" x-text="b.branch"></td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400" x-text="b.city"></td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400" x-text="b.date"></td>
              <td class="px-6 py-4 whitespace-nowrap">
                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                  :class="{
                    'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200': b.status === 'Active',
                    'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200': b.status !== 'Active'
                  }"
                  x-text="b.status"></span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <a :href="'/hq/branch/' + b.branch_id + '/overview/'" class="text-blue-600 dark:text-blue-400 hover:text-blue-900 dark:hover:text-blue-500">View</a>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</div>
