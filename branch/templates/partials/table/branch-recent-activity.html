<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
  <!-- Recent Loan Activity -->
  <div class="bg-white rounded-lg p-4 border border-stroke dark:border-gray-700 dark:bg-boxdark">
    <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Recent Loan Activity</h3>
      <a href="{% url 'branch:loan_pending_application' %}" class="text-sm text-blue-600 dark:text-blue-400 hover:underline">View All</a>
    </div>
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Ref</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Customer</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Amount</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Date</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Status</th>
          </tr>
        </thead>
        <tbody class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
          <template x-if="(recentLoans || []).length === 0">
            <tr>
              <td colspan="5" class="px-6 py-4 text-center text-sm text-gray-500 dark:text-gray-400">No recent loans</td>
            </tr>
          </template>
          <template x-for="loan in (recentLoans || []).slice(0, 5)" :key="loan.id">
            <tr>
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white" x-text="loan.ref_no"></td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700 dark:text-gray-300" x-text="loan.customer"></td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700 dark:text-gray-300" x-text="new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(loan.amount || 0)"></td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700 dark:text-gray-300" x-text="loan.date"></td>
              <td class="px-6 py-4 whitespace-nowrap text-sm">
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                  :class="{
                    'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300': loan.status === 'pending',
                    'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300': ['branch_approved','hq_approved','disbursed','disbursed_fund_released'].includes(loan.status),
                    'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300': ['reject','rejected_by_branch','hq_rejected'].includes(loan.status),
                    'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300': true
                  }"
                  x-text="loan.status">
                </span>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Recent Agent Activity -->
  <div class="bg-white rounded-lg p-4 border border-stroke dark:border-gray-700 dark:bg-boxdark">
    <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Recent Agent Activity</h3>
      <a href="{% url 'branch:agent' %}" class="text-sm text-blue-600 dark:text-blue-400 hover:underline">View All</a>
    </div>
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">ID</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Agent</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Applications</th>
          </tr>
        </thead>
        <tbody class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
          <template x-if="(recentAgents || []).length === 0">
            <tr>
              <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500 dark:text-gray-400">No recent agent activity</td>
            </tr>
          </template>
          <template x-for="agent in (recentAgents || []).slice(0, 5)" :key="agent.agent_id">
            <tr>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700 dark:text-gray-300" x-text="agent.agent_id"></td>
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white" x-text="agent.name"></td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700 dark:text-gray-300" x-text="agent.applications"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</div>
