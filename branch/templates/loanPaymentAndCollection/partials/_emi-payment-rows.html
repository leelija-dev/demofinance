{% for loan in loans %}
<tr class="hover:bg-gray-100 {% if loan.all_emi_paid %}bg-green-100{% endif %}">
    <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">
        {{ loan.loan_ref_no }}
    </td>
    <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">
        {{ loan.customer_name|default:'N/A' }}
    </td>
    <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">
        ₹{{ loan.loan_amount|default:'0.00' }}
    </td>
    <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">
        {{ loan.disbursed_date|default:'N/A' }}
    </td>
    <td class="px-4 py-3 whitespace-nowrap text-sm font-medium">
        <a href="{% url 'branch:emi_schedule' %}?loan_ref_no={{ loan.loan_ref_no }}"
           class="text-indigo-600 hover:text-indigo-900">
            View EMI
        </a>
        {% if not loan.all_emi_paid %}
        <button class="ml-2 bg-indigo-600 font-bold py-1 px-2 rounded opacity-60 cursor-not-allowed"
                disabled>
            <span class="inline-flex items-center">
                <span class="text-gray-400">Auto Pay</span>
                <svg class="h-4 w-4 absolute ml-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 1 1-3.2-6.9"/>
                    <path d="M21 3v6h-6"/>
                </svg>
            </span>
        </button>
        {% endif %}
         <!-- <button class="ml-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-1 px-2 rounded"
                onclick="autoPayLoan('{{ loan.loan_ref_no }}')">
            Auto Pay
         </button> -->
    </td>
</tr>
{% endfor %}

<script src="/static/branch/js/auto-pay.js"></script>
