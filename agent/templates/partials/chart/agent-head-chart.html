<div
  class="mb-6 flex  gap-3 flex-wrap sm:items-center sm:justify-between justify-center"
>
  <h2 class="text-2xl font-bold text-gray-900 dark:text-white sm:text-left text-center">
    Loan Analytics Dashboard
  </h2>

  <div class="flex flex-wrap items-center gap-2 sm:justify-start justify-center">
    <div class="flex bg-white dark:bg-gray-800 rounded-lg shadow  space-x-1 py-2 px-[0.7rem]">
      <button
        @click="timeRange = 'day'; fetchData();"
        :class="{'bg-blue-500 text-white': timeRange === 'day', 'text-gray-700 dark:text-gray-300': timeRange !== 'day'}"
        class="filter-btn text-sm font-medium transition-colors p-[0.1rem] px-[0.3rem] rounded-[6px]"
      >
        Daily
      </button>
      <button
        @click="timeRange = 'month'; fetchData();"
        :class="{'bg-blue-500 text-white': timeRange === 'month', 'text-gray-700 dark:text-gray-300': timeRange !== 'month'}"
        class="filter-btn text-sm font-medium transition-colors p-[0.1rem] px-[0.3rem] rounded-[6px]"
      >
        Monthly
      </button>
      <button
        @click="timeRange = 'year'; fetchData();"
        :class="{'bg-blue-500 text-white': timeRange === 'year', 'text-gray-700 dark:text-gray-300': timeRange !== 'year'}"
        class="filter-btn text-sm font-medium transition-colors p-[0.1rem] px-[0.3rem] rounded-[6px]"
      >
        Yearly
      </button>
    </div>

    <select
      x-show="timeRange === 'year'"
      x-model="selectedYear"
      @change="fetchData()"
      class="text-sm border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-800 dark:border-gray-700 dark:text-white"
    >
      <template x-for="year in years" :key="year">
        <option x-text="year" :value="year"></option>
      </template>
    </select>

    <template x-if="timeRange === 'month'">
      <div class="flex space-x-2">
        <select
          x-model="selectedYear"
          @change="fetchData()"
          class="text-sm border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-800 dark:border-gray-700 dark:text-white"
        >
          <template x-for="year in years" :key="year">
            <option x-text="year" :value="year"></option>
          </template>
        </select>
        <select
          x-model="selectedMonth"
          @change="fetchData()"
          class="text-sm border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-800 dark:border-gray-700 dark:text-white"
        >
          <template x-for="month in months" :key="month.value">
            <option x-text="month.name" :value="month.value"></option>
          </template>
        </select>
      </div>
    </template>

    <template x-if="timeRange === 'day'">
      <div class="flex space-x-2">
        <select
          x-model="selectedYear"
          @change="fetchData()"
          class="text-sm border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-800 dark:border-gray-700 dark:text-white"
        >
          <template x-for="year in years" :key="year">
            <option x-text="year" :value="year"></option>
          </template>
        </select>
        <select
          x-model="selectedMonth"
          @change="fetchData()"
          class="text-sm border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-800 dark:border-gray-700 dark:text-white"
        >
          <template x-for="month in months" :key="month.value">
            <option x-text="month.name" :value="month.value"></option>
          </template>
        </select>
        <select
          x-model="selectedDay"
          @change="fetchData()"
          class="text-sm border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-800 dark:border-gray-700 dark:text-white"
        >
          <template x-for="day in days" :key="day">
            <option x-text="day" :value="day"></option>
          </template>
        </select>
      </div>
    </template>
  </div>
</div>

<!-- Stats Cards -->
<div class="flex flex-wrap gap-4 mb-6">
  <!-- Applied Card -->
  <div class="stat-card applied flex-1 min-w-[200px]">
    <div class="flex items-center justify-between">
      <div>
        <h4 class="text-sm font-medium text-gray-500 dark:text-gray-400">
          Loan Applied
        </h4>
        <h2
          x-text="loanStats.applied"
          class="mt-1 text-2xl font-bold text-gray-900 dark:text-white"
        ></h2>
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
          +12% from last period
        </p>
      </div>
      <div
        class="flex h-12 w-12 items-center justify-center rounded-full bg-blue-100 dark:bg-blue-900/50"
      >
        <svg
          class="h-6 w-6 text-blue-600 dark:text-blue-400"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
          ></path>
        </svg>
      </div>
    </div>
  </div>

  <!-- Pending Card -->
  <div class="stat-card pending flex-1 min-w-[200px]">
    <div class="flex items-center justify-between">
      <div>
        <h4 class="text-sm font-medium text-gray-500 dark:text-gray-400">
          Pending Approval
        </h4>
        <h2
          x-text="loanStats.pending"
          class="mt-1 text-2xl font-bold text-gray-900 dark:text-white"
        ></h2>
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
          +5% from last period
        </p>
      </div>
      <div
        class="flex h-12 w-12 items-center justify-center rounded-full bg-yellow-100 dark:bg-yellow-900/50"
      >
        <svg
          class="h-6 w-6 text-yellow-600 dark:text-yellow-400"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
          ></path>
        </svg>
      </div>
    </div>
  </div>

  <!-- Approved Card -->
  <div class="stat-card approved flex-1 min-w-[200px]">
    <div class="flex items-center justify-between">
      <div>
        <h4 class="text-sm font-medium text-gray-500 dark:text-gray-400">
          Approved Loans
        </h4>
        <h2
          x-text="loanStats.approved"
          class="mt-1 text-2xl font-bold text-gray-900 dark:text-white"
        ></h2>
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
          +18% from last period
        </p>
      </div>
      <div
        class="flex h-12 w-12 items-center justify-center rounded-full bg-green-100 dark:bg-green-900/50"
      >
        <svg
          class="h-6 w-6 text-green-600 dark:text-green-400"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M5 13l4 4L19 7"
          ></path>
        </svg>
      </div>
    </div>
  </div>

  <!-- Disbursed Card -->
  <div class="stat-card disbursed flex-1 min-w-[200px]">
    <div class="flex items-center justify-between">
      <div>
        <h4 class="text-sm font-medium text-gray-500 dark:text-gray-400">
          Disbursed Loans
        </h4>
        <h2
          x-text="loanStats.disbursed"
          class="mt-1 text-2xl font-bold text-gray-900 dark:text-white"
        ></h2>
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
          +15% from last period
        </p>
      </div>
      <div
        class="flex h-12 w-12 items-center justify-center rounded-full bg-purple-100 dark:bg-purple-900/50"
      >
        <svg
          class="h-6 w-6 text-purple-600 dark:text-purple-400"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"
          ></path>
        </svg>
      </div>
    </div>
  </div>

  <!-- Rejected Card -->
  <div class="stat-card rejected flex-1 min-w-[200px]">
    <div class="flex items-center justify-between">
      <div>
        <h4 class="text-sm font-medium text-gray-500 dark:text-gray-400">
          Rejected Loans
        </h4>
        <h2
          x-text="loanStats.rejected"
          class="mt-1 text-2xl font-bold text-gray-900 dark:text-white"
        ></h2>
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
          -3% from last period
        </p>
      </div>
      <div
        class="flex h-12 w-12 items-center justify-center rounded-full bg-red-100 dark:bg-red-900/50"
      >
        <svg
          class="h-6 w-6 text-red-600 dark:text-red-400"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </div>
    </div>
  </div>
</div>
