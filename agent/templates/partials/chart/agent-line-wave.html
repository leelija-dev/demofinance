<div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4 mt-6">
  <div class="flex items-center justify-between mb-4 sm:flex-row flex-col">
    <div class="sm:text-left text-center">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
        Statistics
      </h3>
      <p class="text-sm text-gray-500 dark:text-gray-400">
        Target you've set for each month
      </p>
    </div>
    <div
      class="flex items-start w-full gap-3 sm:justify-end justify-center flex-wrap sm:mt-0  mt-2"
    >
      <div
        x-data="{selected: 'overview'}"
        class="inline-flex w-fit items-center gap-0.5 rounded-lg bg-gray-100 p-0.5 dark:bg-gray-900"
      >
        <button
          @click="selected = 'overview'; showOverview();"
          :class="selected === 'overview' ? 'shadow-theme-xs text-gray-900 dark:text-white bg-white dark:bg-gray-800' : 'text-gray-500 dark:text-gray-400'"
          class="px-3 py-2 font-medium rounded-md text-theme-sm hover:text-gray-900 dark:hover:text-white"
        >
          Overview
        </button>
        <button
          @click="selected = 'sales'; showSales();"
          :class="selected === 'sales' ? 'shadow-theme-xs text-gray-900 dark:text-white bg-white dark:bg-gray-800' : 'text-gray-500 dark:text-gray-400'"
          class="px-3 py-2 font-medium rounded-md text-theme-sm hover:text-gray-900 dark:hover:text-white"
        >
          Sales
        </button>
        <button
          @click="selected = 'revenue'; showRevenue();"
          :class="selected === 'revenue' ? 'shadow-theme-xs text-gray-900 dark:text-white bg-white dark:bg-gray-800' : 'text-gray-500 dark:text-gray-400'"
          class="px-3 py-2 font-medium rounded-md text-theme-sm hover:text-gray-900 dark:hover:text-white"
        >
          Revenue
        </button>
      </div>

      <div class="relative">
        <div class="relative w-48">
          <input
            type="text"
            class="datepicker-input h-10 w-full rounded-lg border border-gray-200 bg-white py-2.5 pl-10 pr-4 text-theme-sm font-medium text-gray-700 shadow-theme-xs focus:outline-none focus:ring-0 focus-visible:outline-none dark:border-gray-700 dark:bg-gray-800 dark:text-gray-400"
            placeholder="Select date"
            readonly="readonly"
          />
          <div
            class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none"
          >
            <svg
              class="w-5 h-5 text-gray-500 dark:text-gray-400"
              fill="currentColor"
              viewBox="0 0 20 20"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                fill-rule="evenodd"
                d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z"
                clip-rule="evenodd"
              ></path>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="statsChart"></div>
</div>
