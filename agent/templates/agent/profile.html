    <div

      <div

                <label for="profilePhotoInput" class="cursor-pointer inline-flex items-center gap-2 rounded-full bg-white/90 px-4 py-1 text-sm font-medium text-gray-800 shadow hover:bg-white">

                Full Name
              </p>
              <p
                data-field="fullName"
                class="text-sm font-medium text-gray-800 dark:text-white/90"

            </div>

            <div>

                class="mb-2 text-xs leading-normal text-gray-500 dark:text-gray-400"
              >
                Agent ID
              </p>
              <p
                class="text-sm font-medium text-gray-800 dark:text-white/90"
                data-field="agentId"

                Loading.....

    <button

          >
            <svg
              class="fill-current"

              height="18"
              viewBox="0 0 18 18"
              fill="none"

            >

                fill=""
              />

            Change Password
          </button>
  </div>
</div>

<!-- Profile Info Modal -->
<div
  id="changePasswordModal"
  class="fixed inset-0 z-[9999] hidden overflow-y-auto"
>
  <div
    class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:flex sm:p-0"
  >
    <div class="fixed inset-0 transition-opacity" aria-hidden="true">
      <div class="absolute inset-0 bg-gray-500 opacity-75"></div>
    </div>

    <div
      class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full dark:bg-gray-800"
    >
      <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4 dark:bg-gray-800">
        <h3
          class="text-lg leading-6 font-medium text-gray-900 dark:text-white mb-4"
        >
          Edit Profile
        </h3>
        <form id="passwordForm" enctype="multipart/form-data">
          <div class="grid grid-cols-1 gap-4">

            <!-- New Password -->
            <div>
              <label
                for="password"
                class="block text-sm font-medium text-gray-700 dark:text-gray-300"
                >New Password</label
              >
              <input
                type="password"
                name="new-password"
                id="new-password"
                class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                placeholder="New Password"
              />
            </div>

            <!-- Confirm Password -->
            <div>
              <label
                for="password"
                class="block text-sm font-medium text-gray-700 dark:text-gray-300"
                >Confirm Password</label
              >
              <input
                type="password"
                name="confirm-password"
                id="confirm-password"
                class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                placeholder="Confirm Password"
              />
            </div>

          </div>
        </form>
        <div class="mt-2">
          <p id="passwordError" class="text-red-500 text-sm hidden"></p>
        </div>
      </div>
      <div
        class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse dark:bg-gray-800"
      >
        <button
          type="submit"
          form="passwordForm"
          class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:ml-3 sm:w-auto sm:text-sm"
        >
          Save
        </button>
        <button
          type="button"
          data-close="changePasswordModal"
          class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm dark:bg-gray-700 dark:text-white dark:border-gray-600"
        >
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>

<script src="{% static 'agent/js/profile.js' %}"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const changePasswordModal = document.getElementById("changePasswordModal");
    const passwordForm = document.getElementById("passwordForm");
    passwordForm.addEventListener("submit", chnagepassword);

    fetchAgentData();
    setupProfilePhotoUploader();
    setupModal(changePasswordModal);

    document.querySelectorAll('[data-target="changePasswordModal"]').forEach((btn) => {
      btn.addEventListener("click", () => {
        changePasswordModal.classList.remove("hidden");
        document.body.classList.add("overflow-hidden");
      });
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && changePasswordModal && !changePasswordModal.classList.contains("hidden")) {
        changePasswordModal.classList.add("hidden");
        document.body.classList.remove("overflow-hidden");
      }
    });
  });
</script>

{% endblock %}
