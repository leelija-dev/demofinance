{% for item in rows %}
<tr>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ item.assignment_id }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ item.loan_ref_no }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ item.customer_name }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ item.branch_name }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">₹{{ item.emi_amount|floatformat:2 }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">₹{{ item.principal_amount|floatformat:2 }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">₹{{ item.interest_amount|floatformat:2 }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ item.installment_date }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm">
        <span class="px-2 py-1 rounded-full text-sm {% if item.status == 'collected' %}bg-green-100 text-green-800{% elif item.status == 'verified' %}bg-blue-100 text-blue-800{% else %}bg-orange-100 text-orange-800{% endif %}">{{ item.status }}</span>
    </td>
</tr>
{% endfor %}
